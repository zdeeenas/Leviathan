#####################################################################
# Voron 2.4 350mm Leviathan V1.1 – printer.cfg
# Sensorless X/Y + Cartographer + TMC5160/2209
#####################################################################

########################################
# MCU / Basic I/O
########################################
[mcu]
canbus_uuid: c0d0da3a827d

[respond]
default_type: echo

[force_move]
enable_force_move: True

[virtual_sdcard]
path: /home/pi/printer_data/gcodes

########################################
# Temperature Sensors
########################################
[temperature_sensor mcu_temp]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

[temperature_sensor raspberry_pi]
sensor_type: temperature_host
min_temp: 0
max_temp: 100

[temperature_sensor chamber]
sensor_type: Generic 3950
sensor_pin: PA2
min_temp: 0
max_temp: 100
gcode_id: C

[temperature_sensor Cartographer_MCU]
sensor_type: temperature_mcu
sensor_mcu: scanner
min_temp: 0
max_temp: 105

########################################
# Printer Settings
########################################
[printer]
kinematics: corexy
max_velocity: 400
max_accel: 10000
max_z_velocity: 15
max_z_accel: 500
square_corner_velocity: 8.0

########################################
# Includes – macros, UI, sensors, etc.
########################################
[include mainsail.cfg]
[include macros.cfg]
[include leviathansensorless.cfg]
[include toolhead_leds.cfg]
[include timelapse.cfg]
[include bedfans-dualcontrol.cfg]
#[include config_backup.cfg]
#[include AFC/*.cfg]
[include ebb36-gen2.cfg]

########################################
# Autotune – Stepper Motors
########################################
[autotune_tmc stepper_x]
motor: omc-17hs19-2504s-h
tuning_goal: performance
voltage: 48

[autotune_tmc stepper_y]
motor: omc-17hs19-2504s-h
tuning_goal: performance
voltage: 48

[autotune_tmc stepper_z]
motor: moons-ms17hd6p420I-05
tuning_goal: silent
voltage: 24

[autotune_tmc stepper_z1]
motor: moons-ms17hd6p420I-05
tuning_goal: silent
voltage: 24

[autotune_tmc stepper_z2]
motor: moons-ms17hd6p420I-05
tuning_goal: silent
voltage: 24

[autotune_tmc stepper_z3]
motor: moons-ms17hd6p420I-05
tuning_goal: silent
voltage: 24

[autotune_tmc extruder]
motor: ldo-36sth20-1004ahg-9T
tuning_goal: silent
voltage: 24

########################################
# Shake&Tune
########################################
[shaketune]
result_folder: ~/printer_data/config/ShakeTune_results
number_of_results_to_keep: 10
keep_raw_data: False
show_macros_in_webui: True
timeout: 600
measurements_chunk_size: 2
max_freq: 200
dpi: 300

########################################
# Scanner / Cartographer
########################################
[mcu scanner]
canbus_uuid: a6811771c2f5

[scanner]
mcu: scanner
x_offset: 0
y_offset: 22
backlash_comp: 0.011
sensor: cartographer
sensor_alt: carto
mesh_runs: 2

########################################
# ADXL / Resonance Tester
########################################
[adxl345]
cs_pin: scanner:PA3
spi_bus: spi1

[resonance_tester]
accel_chip: adxl345
probe_points:
  175,175,20
accel_per_hz: 100
sweeping_accel: 400
sweeping_period: 0

########################################
# SHAPER / Input Shaper
########################################
#[input_shaper]
#shaper_freq_x: 53.2
#shaper_type_x: mzv
#shaper_freq_y: 41.6
#shaper_type_y: mzv

########################################
# X/Y Steppers – Sensorless Homing
########################################
[stepper_x]
step_pin: PB10
dir_pin: !PB11
enable_pin: !PG0
rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 200
endstop_pin: tmc5160_stepper_x:virtual_endstop
position_min: 0
position_endstop: 344
position_max: 344
homing_speed: 50
homing_positive_dir: true
use_sensorless_homing: true
min_home_dist: 5

[tmc5160 stepper_x]
cs_pin: PE15
spi_software_mosi_pin: PE14
spi_software_miso_pin: PE13
spi_software_sclk_pin: PE12
interpolate: True
diag0_pin: ^!PG1
driver_SGT: 15
run_current: 1.1
home_current: 0.56
current_change_dwell_time: 0.5
sense_resistor: 0.075
stealthchop_threshold: 0

[stepper_y]
step_pin: PF15
dir_pin: !PF14
enable_pin: !PE9
rotation_distance: 40
microsteps: 32
full_steps_per_rotation: 200
endstop_pin: tmc5160_stepper_y:virtual_endstop
position_min: 0
position_endstop: 360
position_max: 360
homing_speed: 50
homing_retract_dist: 0
homing_positive_dir: true
use_sensorless_homing: true
min_home_dist: 5

[tmc5160 stepper_y]
cs_pin: PE11
spi_software_mosi_pin: PE14
spi_software_miso_pin: PE13
spi_software_sclk_pin: PE12
interpolate: True
diag0_pin: ^!PE10
driver_SGT: 10
run_current: 1.1
home_current: 0.56
current_change_dwell_time: 0.5
sense_resistor: 0.075
stealthchop_threshold: 0

########################################
# Z Steppers
########################################
[stepper_z]
step_pin: PD4
dir_pin: !PD3
enable_pin: !PD7
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32
endstop_pin: probe:z_virtual_endstop
homing_retract_dist: 0
position_min: -5
position_max: 330
homing_speed: 8
second_homing_speed: 3

[tmc2209 stepper_z]
uart_pin: PD5
interpolate: false
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

[stepper_z1]
step_pin: PC12
dir_pin: PC11
enable_pin: !PD2
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

[tmc2209 stepper_z1]
uart_pin: PD0
interpolate: false
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

[stepper_z2]
step_pin: PC9
dir_pin: !PC8
enable_pin: !PC10
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

[tmc2209 stepper_z2]
uart_pin: PA8
interpolate: false
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

[stepper_z3]
step_pin: PG7
dir_pin: PG6
enable_pin: !PC7
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

[tmc2209 stepper_z3]
uart_pin: PG8
interpolate: false
run_current: 0.8
sense_resistor: 0.110
stealthchop_threshold: 0

########################################
# Bed Heater
########################################
[heater_bed]
##  SSR Pin - HEATBED
##  Thermistor - TH1
heater_pin: PG11
## Check what thermistor type you have. See https://www.klipper3d.org/Config_Reference.html#common-thermistors for common thermistor types.
## Use "Generic 3950" for Keenovo heaters
sensor_type: Generic 3950
sensor_pin: PA1
pullup_resistor: 2200
##  Adjust Max Power so your heater doesn't warp your bed. Rule of thumb is 0.4 watts / cm^2 .
max_power: 0.6
min_temp: 0
max_temp: 120
control: pid
pid_kp: 58.437
pid_ki: 2.347
pid_kd: 363.769

########################################
# Fans
########################################
[controller_fan controller_fan]
##  Controller fan - FAN2
pin: PF9
##tachometer_pin: PF6
kick_start_time: 0.5
max_power: 0.25
heater: heater_bed


########################################
# Filament Sensor
########################################
#[filament_switch_sensor Filament]
#pause_on_runout: True
#runout_gcode: M600
#insert_gcode:
#  event_delay: 3.0
#  pause_delay: 0.5
#switch_pin: !PC0

########################################
# LED / Caselight
########################################
[output_pin caselight]
pin: PE6
pwm: true
hardware_pwm: False
value: 0.20
shutdown_value: 0
cycle_time: 0.00025

########################################
# Quad Gantry Level
########################################
[quad_gantry_level]

# Gantry corners for 344x360 build
gantry_corners:
  -60,-10
  410,370

# Probe points (uvnitř fyzického prostoru)
points:
  50,25
  50,335
  294,335
  294,25

speed: 100
horizontal_move_z: 10
retries: 5
retry_tolerance: 0.0075
max_adjust: 10


##--------------------------------------------------------------------

speed: 200
horizontal_move_z: 10
retries: 5
retry_tolerance: 0.0075



########################################
# Idle Timeout
########################################
[idle_timeout]
timeout: 1800

########################################
# Display / EXP1 & EXP2 Pins
########################################
[board_pins]
aliases:
  # EXP1 header
  EXP1_1=PG9, EXP1_2=PG12,
  EXP1_3=PG13, EXP1_4=PG14,
  EXP1_5=PC13, EXP1_6=PC14,
  EXP1_7=PC15, EXP1_8=PF0,
  EXP1_9=<GND>, EXP1_10=<5V>,
  # EXP2 header
  EXP2_1=PA6, EXP2_2=PA5,
  EXP2_3=PE2, EXP2_4=PE4,
  EXP2_5=PE3, EXP2_6=PA7,
  EXP2_7=PE5, EXP2_8=<RST>,
  EXP2_9=<GND>, EXP2_10=PE4

