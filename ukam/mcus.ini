########################################
# CARTOGRAPHER (NON-KLIPPER FW)
########################################
[cartographer]
klipper_section: mcu scanner
is_klipper_fw: false
action_command: ~/cartographer-klipper/scripts/firmware.py -d a6811771c2f5 -f CAN